apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: mustgather-pvc-template
objects:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: "${NAME}"
      namespace: "${NAMESPACE}"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "${STORAGE}"
parameters:
  - name: NAME
  - name: NAMESPACE
  - name: STORAGE
    value: "5Gi"
