apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: mustgather-reader-pod-template
objects:
  - apiVersion: v1
    kind: Pod
    metadata:
      name: "${NAME}"
      namespace: "${NAMESPACE}"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: reader-container
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["sleep", "3600"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: persistent-storage
          mountPath: /data
      volumes:
      - name: persistent-storage
        persistentVolumeClaim:
          claimName: "${PVCNAME}"
      restartPolicy: Never
parameters:
  - name: NAME
  - name: NAMESPACE
  - name: PVCNAME
