apiVersion: apiextensions.k8s.io/v1
name: "MustGather"
crdName: mustgathers.operator.openshift.io
tests:
  onCreate:
    - name: Should be able to create a minimal MustGather with required serviceAccountName
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin

    - name: Should reject MustGather without serviceAccountName (required field)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-no-sa
          namespace: openshift-must-gather-operator
        spec: {}
      expectedError: "serviceAccountName"

    - name: Should reject MustGather with empty serviceAccountName (minLength=1)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-empty-sa
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: ""
      expectedError: "serviceAccountName"

    - name: Should allow audit with default image (no imageStreamRef, no custom command)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-audit-valid
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          gatherSpec:
            audit: true
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-audit-valid
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          gatherSpec:
            audit: true

    - name: Should reject audit with custom image (imageStreamRef set)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-audit-custom-image
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          imageStreamRef:
            name: custom-must-gather
            tag: latest
          gatherSpec:
            audit: true
      expectedError: "audit mode is only supported with the default must-gather image"

    - name: Should reject audit with custom command (gatherSpec.command set)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-audit-custom-command
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          gatherSpec:
            audit: true
            command:
              - /usr/bin/custom-gather
      expectedError: "audit mode cannot be combined with custom gather commands"

    - name: Should allow MustGather with custom image and no audit
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-custom-image
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          imageStreamRef:
            name: custom-must-gather
            tag: latest
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-custom-image
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          imageStreamRef:
            name: custom-must-gather
            tag: latest

    - name: Should allow MustGather with custom command and no audit
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-custom-command
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          gatherSpec:
            command:
              - /usr/bin/custom-gather
            args:
              - --verbose
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-custom-command
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          gatherSpec:
            command:
              - /usr/bin/custom-gather
            args:
              - --verbose

    - name: Should allow MustGather with all optional fields
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-full
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          mustGatherTimeout: 30m
          retainResourcesOnCompletion: true
          gatherSpec:
            since: 2h
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-full
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          mustGatherTimeout: 30m
          retainResourcesOnCompletion: true
          gatherSpec:
            since: 2h

  onUpdate:
    - name: Should reject updates to spec (immutable)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-immutable
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-immutable
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: different-service-account
      expectedError: "spec values are immutable once set"

    - name: Should reject updates to serviceAccountName
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-sa-update
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          retainResourcesOnCompletion: false
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-sa-update
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: another-sa
          retainResourcesOnCompletion: false
      expectedError: "spec values are immutable once set"

    - name: Should reject updates to any spec field
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-timeout-update
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          mustGatherTimeout: 10m
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: MustGather
        metadata:
          name: test-mustgather-timeout-update
          namespace: openshift-must-gather-operator
        spec:
          serviceAccountName: must-gather-admin
          mustGatherTimeout: 20m
      expectedError: "spec values are immutable once set"
